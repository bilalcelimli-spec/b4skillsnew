# https://render.com/docs/infrastructure-as-code
# Blueprint: Dashboard > New > Blueprint, bu repoyu seçin
#
# Şema: `prisma/migrations` klasörü migrations ile yönetilir
# buildCommand sırasında `migrate deploy` otomatik olarak Phase 3/4 schema değişikliklerini uygular
# CORS: APP_URL yoksa RENDER_EXTERNAL_URL (Render’ın verdiği) kullanılır
# Gizliler: GEMINI, Stripe ve isteğe APP_URL / CORS_ORIGINS Dashboard’da

services:
  - type: web
    name: linguadapt-app
    env: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: linguadapt-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: linguadapt-db
    databaseName: linguadapt
    user: linguadapt
    plan: free
    region: oregon
