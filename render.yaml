# render.yaml — Render.com Infrastructure as Code
# https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: linguadapt-app
    env: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build:all && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: linguadapt-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: APP_URL
        fromService:
          type: web
          name: linguadapt-app
          property: host

databases:
  - name: linguadapt-db
    databaseName: linguadapt
    user: linguadapt
    plan: starter
    region: oregon
