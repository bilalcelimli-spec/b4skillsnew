# fly.toml — Fly.io multi-region deployment config
# Regions: iad (US-East), ams (EU-West), nrt (APAC-Japan), sin (APAC-SEA)
# https://fly.io/docs/reference/configuration/

app = "linguadapt"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  # Region is injected at runtime via FLY_REGION env var
  # Data residency: EU data stays in ams, APAC data stays in nrt/sin, US in iad

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 500
    soft_limit = 400

# ── US-East (primary) ────────────────────────────────────────────────────────
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 2

# ── EU-West (Amsterdam) ──────────────────────────────────────────────────────
[[regions]]
  name = "ams"

# ── APAC-Japan (Tokyo) ───────────────────────────────────────────────────────
[[regions]]
  name = "nrt"

# ── APAC-SEA (Singapore) ────────────────────────────────────────────────────
[[regions]]
  name = "sin"

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "get"
    path = "/api/health"
    port = 3000
    timeout = "5s"
    type = "http"

# ── Statics served from edge via CDN; only /api/* hits origin ────────────────
[[statics]]
  guest_path = "/app/dist"
  url_prefix = "/"
