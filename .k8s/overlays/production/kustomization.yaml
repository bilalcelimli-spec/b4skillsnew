apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: b4skills-prod
namePrefix: prod-
bases:
  - ../../base
replicas:
  - name: b4skills-api
    count: 3
images:
  - name: ghcr.io/b4skills/api
    newTag: latest
patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: b4skills-api
    spec:
      template:
        spec:
          containers:
            - name: api
              resources:
                requests:
                  cpu: "1"
                  memory: "1Gi"
                limits:
                  cpu: "4"
                  memory: "4Gi"
