apiVersion: apps/v1
kind: Deployment
metadata:
  name: b4skills-api
  labels:
    app: b4skills-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: b4skills-api
  template:
    metadata:
      labels:
        app: b4skills-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: b4skills-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: migrate
          image: ghcr.io/b4skills/api:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: b4skills-secrets
          resources:
            limits: { cpu: "500m", memory: "512Mi" }
      containers:
        - name: api
          image: ghcr.io/b4skills/api:latest
          ports:
            - containerPort: 3001
              name: http
            - containerPort: 9090
              name: metrics
          envFrom:
            - secretRef:
                name: b4skills-secrets
            - configMapRef:
                name: b4skills-config
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi"  }
          livenessProbe:
            httpGet: { path: /api/health, port: 3001 }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /api/health, port: 3001 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: b4skills-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: b4skills-config
data:
  NODE_ENV: "production"
  PORT: "3001"
  LOG_LEVEL: "warn"
  ITEM_VALIDATION_STRICT: "true"
