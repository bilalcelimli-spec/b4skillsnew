apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: b4skills-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "60s"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.b4skills.com"
spec:
  tls:
    - hosts:
        - api.b4skills.com
        - app.b4skills.com
      secretName: b4skills-tls
  rules:
    - host: api.b4skills.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: b4skills-api
                port:
                  number: 80
    - host: app.b4skills.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: b4skills-api
                port:
                  number: 80
