apiVersion: v1
kind: Service
metadata:
  name: b4skills-api
  labels:
    app: b4skills-api
spec:
  type: ClusterIP
  selector:
    app: b4skills-api
  ports:
    - name: http
      port: 80
      targetPort: 3001
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: b4skills-api-headless
  labels:
    app: b4skills-api
spec:
  clusterIP: None
  selector:
    app: b4skills-api
  ports:
    - port: 3001
      targetPort: 3001
