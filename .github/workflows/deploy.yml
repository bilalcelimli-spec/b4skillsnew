name: Deploy to Production

on:
  # Only deploy after the full CI pipeline passes on main.
  # This prevents broken builds from reaching production.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    environment: production
    # Only deploy if the triggering CI run succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not set — skipping Render deploy trigger."
            echo "   Add it at: Settings → Secrets and variables → Actions"
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "✅ Render deploy hook triggered."

  post-deploy-smoke:
    name: Post-deploy Auth Smoke
    runs-on: ubuntu-latest
    needs: [deploy-render]
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BASE_URL: ${{ secrets.APP_URL }}
      AUTH_EMAIL: ${{ secrets.AUTH_SMOKE_EMAIL }}
      AUTH_PASSWORD: ${{ secrets.AUTH_SMOKE_PASSWORD }}
      DEPLOY_ALERT_WEBHOOK_URL: ${{ secrets.DEPLOY_ALERT_WEBHOOK_URL }}
    steps:
      - name: Skip smoke if secrets not configured
        if: ${{ env.BASE_URL == '' || env.AUTH_EMAIL == '' || env.AUTH_PASSWORD == '' }}
        run: |
          echo "⚠️  Smoke test secrets (APP_URL / AUTH_SMOKE_EMAIL / AUTH_SMOKE_PASSWORD) not set."
          echo "   Skipping post-deploy smoke test."
          exit 0
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Wait for Render rollout
        run: sleep 45
      - name: Run auth smoke test
        run: npm run smoke:auth
      - name: Optional failure webhook
        if: failure() && env.DEPLOY_ALERT_WEBHOOK_URL != ''
        run: |
          curl -fsSL -X POST "$DEPLOY_ALERT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"b4skills production deploy smoke failed on ${GITHUB_SHA}\"}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Uncomment the block below to deploy via Docker (e.g. Fly.io) instead of Render.
