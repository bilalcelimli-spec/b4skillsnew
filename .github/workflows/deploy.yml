name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  post-deploy-smoke:
    name: Post-deploy Auth Smoke
    runs-on: ubuntu-latest
    needs: [deploy-render]
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BASE_URL: ${{ secrets.APP_URL }}
      AUTH_EMAIL: ${{ secrets.AUTH_SMOKE_EMAIL }}
      AUTH_PASSWORD: ${{ secrets.AUTH_SMOKE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Wait for Render rollout
        run: sleep 45
      - name: Run auth smoke test
        run: npm run smoke:auth
      - name: Optional failure webhook
        if: failure() && secrets.DEPLOY_ALERT_WEBHOOK_URL != ''
        run: |
          curl -fsSL -X POST "${{ secrets.DEPLOY_ALERT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"b4skills production deploy smoke failed on ${GITHUB_SHA}\"}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Uncomment the block below to deploy via Docker (e.g. Fly.io) instead of Render.
