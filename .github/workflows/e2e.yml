name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target URL for E2E tests"
        required: false
        default: "http://localhost:5173"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/b4skills_e2e' }}
      JWT_SECRET: "e2e-test-secret-not-for-production"
      E2E_EMAIL: "e2e-student@b4skills.test"
      E2E_PASSWORD: "E2eTest!2026"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: b4skills_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Set up database
        run: |
          npx prisma migrate deploy
          npx tsx scripts/bootstrap-admin.ts || true
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Build server
        run: npm run build:server

      - name: Start server (background)
        run: |
          NODE_ENV=test node dist/server.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          timeout 30 bash -c 'until curl -s http://localhost:3000/health > /dev/null 2>&1; do sleep 1; done' || true
        env:
          PORT: 3000
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}

      - name: Start Vite dev server (background)
        run: |
          npx vite --port 5173 &
          echo "VITE_PID=$!" >> $GITHUB_ENV
          timeout 20 bash -c 'until curl -s http://localhost:5173 > /dev/null 2>&1; do sleep 1; done' || true

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          E2E_BASE_URL: "http://localhost:5173"
          E2E_EMAIL: ${{ env.E2E_EMAIL }}
          E2E_PASSWORD: ${{ env.E2E_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
