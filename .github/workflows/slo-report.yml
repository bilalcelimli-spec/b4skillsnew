name: Weekly SLO Report

# Generates a 30-day rolling SLO compliance report every Monday morning.
# Output is posted as GitHub Actions step summary and creates a tracking
# issue if any known SLO is non-compliant.
#
# See docs/slo-definitions.md for SLO targets and error budget rules.
on:
  schedule:
    - cron: "0 8 * * 1"   # Her Pazartesi 08:00 UTC (data-retention sonrası)
  workflow_dispatch:
    inputs:
      window_days:
        description: "Report window in days (default: 30)"
        type: number
        default: 30
      format:
        description: "Output format"
        type: choice
        options: [json, markdown]
        default: markdown

jobs:
  slo-report:
    name: Generate SLO Report
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch SLO report
        id: slo
        env:
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          WINDOW_DAYS: ${{ github.event.inputs.window_days || '30' }}
          FORMAT: ${{ github.event.inputs.format || 'markdown' }}
        run: |
          echo "Fetching SLO report (window=${WINDOW_DAYS}d, format=${FORMAT})..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $INTERNAL_API_SECRET" \
            -H "Accept: application/json" \
            "${APP_URL:-https://app.b4skills.com}/api/admin/slo/report?window=${WINDOW_DAYS}&format=${FORMAT}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP $HTTP_CODE"
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "body<<REPORT_EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "REPORT_EOF" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" != "200" ]; then
            echo "SLO report endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
        env:
          APP_URL: ${{ secrets.APP_URL }}

      - name: Parse SLO compliance (JSON mode)
        id: parse
        if: ${{ github.event.inputs.format != 'markdown' }}
        run: |
          BODY='${{ steps.slo.outputs.body }}'
          NON_COMPLIANT=$(echo "$BODY" | node -e "
            const chunks = [];
            process.stdin.on('data', c => chunks.push(c));
            process.stdin.on('end', () => {
              try {
                const r = JSON.parse(chunks.join(''));
                console.log(r.summary.nonCompliantSlos);
              } catch { console.log('0'); }
            });
          " 2>/dev/null || echo "0")
          echo "non_compliant=$NON_COMPLIANT" >> $GITHUB_OUTPUT

      - name: Write GitHub step summary
        if: always()
        run: |
          echo "## Weekly SLO Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +%Y-%m-%d)  |  **Window:** ${{ github.event.inputs.window_days || '30' }} days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.slo.outputs.http_code }}" = "200" ]; then
            echo "${{ steps.slo.outputs.body }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ SLO report fetch failed (HTTP ${{ steps.slo.outputs.http_code }})" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Save report artifact
        if: always()
        run: |
          echo "${{ steps.slo.outputs.body }}" > slo-report-$(date -u +%Y-%m-%d).txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slo-report-${{ github.run_number }}
          path: slo-report-*.txt
          retention-days: 365

      - name: Create issue on non-compliance
        if: ${{ steps.parse.outputs.non_compliant > 0 }}
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ SLO Non-compliance Detected — ${date}`,
              body: `
            ## SLO Non-compliance Report

            **Date:** ${date}
            **Workflow:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            **Non-compliant SLOs:** ${{ steps.parse.outputs.non_compliant }}

            ### Action Required

            Review the [full SLO report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) and:

            1. Identify the root cause of each non-compliant SLO
            2. Check error budget consumption (>75% → freeze non-critical deploys)
            3. File a post-mortem if > 1 hour of downtime (see \`docs/post-mortem-template.md\`)
            4. Update SLO targets if permanently unachievable (requires Assessment Director sign-off)

            ### Error Budget Rules (docs/slo-definitions.md §3)

            | Budget Consumed | Action |
            |---|---|
            | >25% | Investigate root cause |
            | >50% | Halt non-critical feature work |
            | >75% | Freeze all deploys except critical fixes |
            | 100% | SLA breach — notify affected organizations |

            /cc @bilalcelimli-spec
              `,
              labels: ['slo', 'ops', 'reliability'],
            });

      - name: Create issue on workflow failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 SLO Report Workflow Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `
            ## SLO Report Workflow Failure

            The weekly SLO report workflow failed to run.

            **Workflow run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Likely causes
            - \`APP_URL\` or \`INTERNAL_API_SECRET\` secret missing/expired
            - API server unreachable (check \`/healthz\`)
            - Database connectivity issue

            /cc @bilalcelimli-spec
              `,
              labels: ['slo', 'ops', 'critical'],
            });
