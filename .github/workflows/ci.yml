name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run type-check

  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Vitest (psychometric engine)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Run psychometric test suite
        run: npm test
      - name: Coverage report
        run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  seed-quality:
    name: Seed Quality Gate (Vocabulary)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Validate vocab seed integrity and semantic image rules
        run: npm run quality:vocab

  # ─────────────────────────────────────────────────────────────────────────────
  item-validation:
    name: Item Validation Gate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Validate item schemas and structure
        run: npm run validate:items
      - name: Verify skill-coverage per profile
        # Critical now that WRITING/SPEAKING are mandatory in every product
        # line — a gap in productive items would silently downgrade the
        # user's exam. Fails the build if any profile × skill × CEFR cell
        # has fewer than `minItems` ACTIVE items.
        run: npm run verify:coverage
        continue-on-error: false
      - name: Verify IRT health (no zero-information items)
        # An ACTIVE item with discrimination a ≤ 0 produces zero Fisher
        # information and is invisible to the MFI-based CAT selector, silently
        # degrading adaptivity. Fails the build if any such item exists.
        run: npm run verify:irt
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (Vite + Server)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Build Vite frontend
        run: npm run build
      - name: Bundle Express server
        run: npm run build:server
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [type-check, test, seed-quality, item-validation, build]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
