name: Data Retention Enforcement

# KVKK m.7 / GDPR Art.5(1)(e) — "storage limitation" principle.
# Runs weekly on Monday 03:00 UTC (after Sunday backup completes).
on:
  schedule:
    - cron: "0 3 * * 1"   # Her Pazartesi 03:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Kuru çalıştırma (veritabanına yazmadan simüle et)"
        type: boolean
        default: true

jobs:
  enforce-retention:
    name: Enforce Data Retention Schedules
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run retention enforcement
        id: retention
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "Running data retention enforcement (dryRun=$DRY_RUN)..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $INTERNAL_API_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"dryRun\": $DRY_RUN}" \
            "${APP_URL:-https://app.b4skills.com}/api/admin/data-retention/run?dry=$([ "$DRY_RUN" = "true" ] && echo 1 || echo 0)")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP $HTTP_CODE"
          echo "Response: $BODY"
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Retention enforcement failed with HTTP $HTTP_CODE"
            exit 1
          fi
        env:
          APP_URL: ${{ secrets.APP_URL }}

      - name: Upload retention log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-retention-log-${{ github.run_number }}
          path: retention-output.txt
          retention-days: 365

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Data Retention Enforcement Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `
              ## Data Retention Enforcement Failure

              **Date:** ${new Date().toISOString()}
              **Dry Run:** ${{ github.event.inputs.dry_run || 'false' }}
              **Workflow run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

              ### KVKK / GDPR Compliance Risk

              Data retention enforcement failed. Manual intervention required to ensure
              compliance with KVKK m.7 (veri saklama süresi) and GDPR Art.5(1)(e) (storage limitation).

              **Retention schedules at risk:**
              - Ses dosyaları: 90 gün sonra silinmeli
              - Sınav oturumları: 5 yıl sonra anonimleştirilmeli

              ### Action Required

              1. Check workflow logs
              2. Verify \`DATABASE_URL\` and \`INTERNAL_API_SECRET\` secrets
              3. Run manually: \`POST /api/admin/data-retention/run\`
              4. Document in compliance log if > 7 days late

              /cc @bilalcelimli-spec
              `,
              labels: ['compliance', 'kvkk', 'gdpr', 'critical'],
            });

      - name: Summary
        if: always()
        run: |
          echo "## Data Retention Enforcement" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Run Date | $(date -u +%Y-%m-%d) |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ github.event.inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HTTP Status | ${{ steps.retention.outputs.http_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Retention Policy:**" >> $GITHUB_STEP_SUMMARY
          echo "- Ses dosyaları: 90 gün" >> $GITHUB_STEP_SUMMARY
          echo "- Sınav oturumları: 5 yıl (sonra anonimleştirme)" >> $GITHUB_STEP_SUMMARY
          echo "- Teknik günlükler: 1 yıl (server log rotation)" >> $GITHUB_STEP_SUMMARY
